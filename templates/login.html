<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛衣织造助手 - {{ "注册" if mode == "register" else "登录" }}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: linear-gradient(160deg, #fdf6f0 0%, #f0e6d8 40%, #e8ddd0 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: white;
  border-radius: 24px;
  padding: 48px 40px;
  width: 420px;
  max-width: 90vw;
  box-shadow: 0 12px 48px rgba(0,0,0,0.08);
  text-align: center;
}
.logo { font-size: 3.5em; margin-bottom: 8px; }
.login-card h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.8em;
  color: #6b4f35;
  margin-bottom: 4px;
}
.login-card .tagline {
  color: #a09080;
  font-size: 0.95em;
  margin-bottom: 32px;
}
.form-group {
  text-align: left;
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-weight: 500;
  margin-bottom: 6px;
  color: #6b5a48;
  font-size: 0.9em;
}
.form-group input {
  width: 100%;
  padding: 13px 16px;
  border: 2px solid #e8ddd0;
  border-radius: 12px;
  font-size: 1em;
  font-family: inherit;
  outline: none;
  background: #faf8f5;
  transition: border-color 0.3s;
}
.form-group input:focus { border-color: #d4a574; background: white; }
.submit-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #d4a574, #c4956a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1.05em;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.3s;
}
.submit-btn:hover {
  background: linear-gradient(135deg, #c4956a, #b4855a);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(180,140,100,0.3);
}
.switch-link {
  margin-top: 20px;
  font-size: 0.9em;
  color: #a09080;
}
.switch-link a { color: #d4a574; text-decoration: none; font-weight: 500; }
.switch-link a:hover { text-decoration: underline; }
.error-msg {
  background: #fef2f2;
  color: #c0392b;
  padding: 10px 16px;
  border-radius: 10px;
  margin-bottom: 16px;
  font-size: 0.9em;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">🧶</div>
  <h1>毛衣织造助手</h1>
  <p class="tagline">发现编织的乐趣</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('register') if mode == 'register' else url_for('login') }}">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" placeholder="输入用户名" required autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" placeholder="输入密码" required>
    </div>
    <button class="submit-btn" type="submit">
      {{ "注 册" if mode == "register" else "登 录" }}
    </button>
  </form>

  <div class="switch-link">
    {% if mode == "register" %}
      已有账号？<a href="{{ url_for('login') }}">去登录</a>
    {% else %}
      没有账号？<a href="{{ url_for('register') }}">注册一个</a>
    {% endif %}
  </div>
</div>
</body>
</html>
